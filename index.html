
<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>آفاق التعليمية</title><link rel="stylesheet" href="css/style.css"></head>
<body><div class="top"><div class="brand">آفاق التعليمية</div><button id="theme" class="ghost">🌙</button></div>
<section class="hero"><h1>مرحباً بك في منصة آفاق التعليمية</h1><p>إدارة حديثة للدروس والاختبارات والاشتراكات والنتائج بتزامن حقيقي.</p></section>
<div class="cards">
  <div class="role-card" data-role="student"><div class="icon">🎓</div><b>تسجيل الطالب</b><small>الدروس والاختبارات والنتائج</small></div>
  <div class="role-card" data-role="teacher"><div class="icon">👨‍🏫</div><b>تسجيل المدرس</b><small>إدارة المادة والطلاب</small></div>
  <div class="role-card" data-role="parent"><div class="icon">👪</div><b>ولي الأمر</b><small>متابعة مستوى الطالب</small></div>
  <div class="role-card" data-role="admin"><div class="icon">🛡️</div><b>المدير</b><small>التحكم الكامل</small></div>
</div>
<div class="modal" id="loginModal"><form class="modal-box" id="loginForm"><button type="button" class="close" id="close">×</button><h2 id="modalTitle"></h2><div id="fields"></div><button class="primary" type="submit">دخول</button><button type="button" id="registerBtn" class="ghost hidden">تسجيل طلب اشتراك</button></form></div>
<div class="modal" id="reqModal"><form class="modal-box" id="reqForm"><button type="button" class="close" id="closeReq">×</button><h2>طلب اشتراك طالب</h2>
<div class="field"><label>اسم الطالب الثلاثي</label><input id="r_name" required></div><div class="field"><label>اسم ولي الأمر</label><input id="r_parent" required></div><div class="field"><label>المرحلة</label><select id="r_stage"></select></div><div class="field"><label>الهاتف</label><input id="r_phone"></div><div class="field"><label>المبلغ</label><input id="r_amount"></div><button class="primary">إرسال الطلب</button></form></div>
<div class="status-dot">Firebase</div><script type="module" src="js/index.js?v=90"></script></body></html>
