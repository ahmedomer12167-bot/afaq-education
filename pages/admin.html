<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة المدير</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div><h1>لوحة المدير</h1><p class="muted">النسخة 4.2 - الحماية وتسجيل الدخول الحقيقي</p></div><button id="themeToggle" class="theme-toggle" data-theme-toggle>☀️</button><a class="btn" href="../index.html">خروج</a></header><section class="layout"><aside class="side" id="side"></aside><div id="content"></div></section></main><div class="modal" id="genericModal"><div class="box"><button class="x" onclick="genericModal.classList.remove('active')">×</button><h2 id="genericTitle">إضافة</h2><form id="genericForm" class="formgrid"><div id="genericFields" class="full formgrid"></div><button class="primary full">حفظ</button></form></div></div><div class="modal" id="detailModal"><div class="box"><button class="x" onclick="detailModal.classList.remove('active')">×</button><h2>المعلومات</h2><div id="detailContent"></div></div></div><div class="modal" id="acceptModal">
  <div class="box">

    <form id="acceptForm" class="formgrid">
      <input type="hidden" id="acceptRequestId">
      <div class="field"><label>كود الطالب</label><input id="acceptStudentCode" required></div>
      <div class="field"><label>تاريخ البداية</label><input id="acceptStart" type="date" required></div>
      <div class="field"><label>تاريخ الانتهاء</label><input id="acceptEnd" type="date" required></div>
      <div class="field full"><label>ملاحظات المدير</label><textarea id="acceptNote"></textarea></div>
      <button class="primary full">اعتماد الاشتراك</button>
    </form>
  </div>
</div>
