<!doctype html><html lang="ar" dir="rtl" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة المدير</title><link rel="stylesheet" href="../css/main.css?v=102"></head><body data-page="admin"><header class="container nav"><div class="brand"><div class="logo">✦</div><div><h2>لوحة المدير</h2><p data-platform-name>آفاق التعليمية</p></div></div><div class="nav-links"><button class="back-home btn-ghost">الرجوع للرئيسية</button><button class="theme-toggle btn-ghost">الوضع</button><button class="logout danger">تسجيل الخروج</button></div></header><main class="container dash"><aside class="sidebar glass"><button class="tab-btn active" data-tab="settings">الإعدادات</button><button class="tab-btn" data-tab="stages">المراحل</button><button class="tab-btn" data-tab="requests">طلبات الاشتراك</button><button class="tab-btn" data-tab="students">الطلاب</button></aside><section class="content">

<div id="stages" class="tab glass"><h2>المراحل الدراسية</h2><form id="stageForm" class="grid"><input id="stageName" class="input" placeholder="اسم المرحلة"><button>إضافة مرحلة</button></form><div id="stagesList"></div></div>
<div id="requests" class="tab glass"><h2>طلبات الاشتراك</h2><div id="requestsList"></div></div>
<div id="students" class="tab glass"><h2>الطلاب المقبولون</h2><div id="studentsList"></div></div>
</section></main><script type="module" src="../js/app.js?v=102"></script></body></html>
