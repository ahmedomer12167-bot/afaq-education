<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة المدير</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div><h1>لوحة المدير</h1><p class="muted">نظام الاشتراكات الكامل - الإصدار 2.9</p></div><a class="btn" href="../index.html">خروج</a></header><section class="layout"><aside class="side" id="side"></aside><div id="content"></div></section></main><div class="modal" id="accM"><div class="box"><button class="x" onclick="accM.classList.remove('active')">×</button><h2>اعتماد الاشتراك</h2><form id="accF" class="grid"><div class="field"><label>كود الطالب</label><input id="code" required></div><div class="field"><label>رقم الماستر</label><input id="master" required></div><div class="field"><label>تاريخ البداية</label><input id="start" type="date" required></div><div class="field"><label>تاريخ الانتهاء</label><input id="end" type="date" required></div><button class="primary" style="grid-column:1/-1">اعتماد الاشتراك</button></form></div></div><div class="modal" id="editM"><div class="box"><button class="x" onclick="editM.classList.remove('active')">×</button><h2 id="editT">إضافة</h2><form id="editF"><div id="editFields"></div><button class="primary">حفظ</button></form></div></div><script src="../js/admin-core.js"></script><script>let current='home',accId='',editKey='',editIdx=null;const nav=[['الرئيسية','home'],['طلبات الاشتراك','requests'],['الطلاب المقبولون','accepted'],['الاشتراكات المنتهية','expired'],['سجل المدفوعات','payments'],['إدارة الطلاب','students'],['إدارة المدرسين','teachers'],['أولياء الأمور','parents'],['المراحل','stages'],['المواد','subjects'],['الإشعارات','notifications'],['الرسائل','messages'],['الحضور','attendance'],['لوحة الشرف','leaderboard'],['المستويات','levels'],['إعادة ضبط','reset']];function drawSide(){side.innerHTML='<h2>آفاق التعليمية</h2>'+nav.map(n=>`<button class="nav ${current===n[1]?'active':''}" onclick="openS('${n[1]}')"><span>${n[0]}</span><span>›</span></button>`).join('')}function openS(s){current=s;drawSide();if(s==='home')home();else if(s==='requests')req('new');else if(s==='accepted')accepted();else if(s==='expired')expiredPage();else if(s==='reset')resetPage();else table(s)}function head(t,d){return `<section class="panel"><div class="panel-head"><div><h2>${t}</h2><p>${d||''}</p></div></div>`}function all(){return get('requests')}function ok(){return all().filter(x=>x.status==='accepted')}function active(){return ok().filter(x=>!expired(x.endDate)&&x.subStatus!=='موقوف')}function exp(){return ok().filter(x=>expired(x.endDate))}function rev(){return get('payments').reduce((a,x)=>a+(+x['المبلغ']||0),0)}function stats(){return `<div class="sub-cards"><div class="sub-card"><h3>🟢 نشطة</h3><strong>${active().length}</strong></div><div class="sub-card"><h3>🔴 منتهية</h3><strong>${exp().length}</strong></div><div class="sub-card"><h3>🟡 طلبات</h3><strong>${all().filter(x=>x.status==='new').length}</strong></div><div class="sub-card"><h3>💰 الإيرادات</h3><strong>${rev().toLocaleString('ar-IQ')}</strong></div></div>`}function home(){content.innerHTML=head('مركز إدارة الاشتراكات','نظرة عامة')+stats()+`</section>`}function req(st){content.innerHTML=head('طلبات الاشتراك الجديدة','قبول الطلب ينشئ الطالب وولي الأمر وسجل الدفع.')+stats()+reqTable(all().filter(x=>x.status===st),true)+`</section>`}function accepted(){content.innerHTML=head('الطلاب المقبولون','تعديل وتجديد وإيقاف وتفعيل.')+stats()+reqTable(ok(),false)+`</section>`}function expiredPage(){content.innerHTML=head('الاشتراكات المنتهية','يمكن تجديدها مباشرة.')+stats()+reqTable(exp(),false)+`</section>`}function reqTable(arr,can){return `<div class="tablebox"><table class="tbl"><tr><th>الطالب</th><th>ولي الأمر</th><th>المرحلة</th><th>الهاتف</th><th>المبلغ</th><th>الكود</th><th>الماستر</th><th>النهاية</th><th>الحالة</th><th>أوامر</th></tr>${arr.length?arr.map(x=>`<tr><td>${x.studentName}</td><td>${x.parentName}</td><td>${x.grade}</td><td>${x.phone}</td><td>${x.amount}</td><td>${x.studentCode||'—'}</td><td>${x.masterNumber||'—'}</td><td>${x.endDate||'—'}</td><td>${expired(x.endDate)?'منتهي':(x.subStatus||x.status)}</td><td><div class="actions">${can?`<button class="btn green" onclick="openAcc('${x.id}')">قبول</button><button class="btn red" onclick="reject('${x.id}')">رفض</button>`:`<button class="btn green" onclick="renew('${x.id}')">تجديد</button><button class="btn orange" onclick="toggle('${x.id}')">${x.subStatus==='موقوف'?'تفعيل':'إيقاف'}</button>`}<button class="btn" onclick="alert('${x.notes||'لا توجد ملاحظات'}')">تفاصيل</button><button class="btn red" onclick="delReq('${x.id}')">حذف</button></div></td></tr>`).join(''):'<tr><td colspan=10><div class="empty">لا توجد بيانات</div></td></tr>'}</table></div>`}function table(k){let f=schemas[k]||['العنوان','الوصف','الحالة'],d=get(k);content.innerHTML=head(k,'إضافة وتعديل وحذف')+`<div class="toolbar"><button class="btn" onclick="openEdit('${k}')">إضافة جديد</button><button class="btn" onclick="alert(JSON.stringify(get('${k}'),null,2))">تصدير</button></div><div class="tablebox"><table class="tbl"><tr>${f.map(x=>`<th>${x}</th>`).join('')}<th>أوامر</th></tr>${d.length?d.map((r,i)=>`<tr>${f.map(x=>`<td>${r[x]||'—'}</td>`).join('')}<td><div class="actions"><button class="btn" onclick="openEdit('${k}',${i})">تعديل</button><button class="btn red" onclick="delRow('${k}',${i})">حذف</button></div></td></tr>`).join(''):'<tr><td colspan='+(f.length+1)+'><div class="empty">لا توجد سجلات</div></td></tr>'}</table></div></section>`}function resetPage(){content.innerHTML=head('إعادة ضبط المنصة','مع نسخة احتياطية وتأكيد')+`<div class="grid">${['إعادة ضبط المنصة بالكامل','حذف جميع الطلاب','حذف الاشتراكات وسجلات الدفع'].map(x=>`<div class="card danger"><h3>${x}</h3><p>سيتم إنشاء نسخة احتياطية قبل التنفيذ.</p><button class="btn red" onclick="danger('${x}')">تنفيذ</button></div>`).join('')}</div></section>`}function openAcc(id){accId=id;code.value='ST-'+Math.floor(1000+Math.random()*9000);master.value='M-'+Date.now().toString().slice(-5);start.value=today();end.value='';accM.classList.add('active')}accF.onsubmit=e=>{e.preventDefault();let r=all(),q=r.find(x=>x.id===accId);let u={...q,status:'accepted',studentCode:code.value,masterNumber:master.value,startDate:start.value,endDate:end.value,subStatus:'نشط'};set('requests',r.map(x=>x.id===accId?u:x));let s=get('students');s.unshift({'الاسم الثلاثي':q.studentName,'المرحلة':q.grade,'كود الطالب':code.value,'رقم الهاتف':q.phone,'الحالة':'مفعل','الاشتراك':'نشط','رقم الماستر':master.value});set('students',s);let p=get('parents');p.unshift({'اسم ولي الأمر':q.parentName,'اسم الطالب':q.studentName,'كود ولي الأمر':code.value,'رقم الهاتف':q.phone});set('parents',p);let pay=get('payments');pay.unshift({'اسم الطالب':q.studentName,'رقم الماستر':master.value,'المبلغ':q.amount,'التاريخ':today(),'نوع العملية':'اشتراك جديد','ملاحظات':q.notes||''});set('payments',pay);accM.classList.remove('active');openS('requests')};function reject(id){set('requests',all().map(x=>x.id===id?{...x,status:'rejected'}:x));openS(current)}function renew(id){let nd=prompt('تاريخ الانتهاء الجديد');if(!nd)return;set('requests',all().map(x=>x.id===id?{...x,endDate:nd,subStatus:'نشط'}:x));openS(current)}function toggle(id){set('requests',all().map(x=>x.id===id?{...x,subStatus:x.subStatus==='موقوف'?'نشط':'موقوف'}:x));openS(current)}function delReq(id){if(confirm('حذف؟')){set('requests',all().filter(x=>x.id!==id));openS(current)}}function openEdit(k,i=null){editKey=k;editIdx=i;let f=schemas[k]||['العنوان','الوصف','الحالة'],r=i!==null?get(k)[i]:{};editT.textContent=i!==null?'تعديل':'إضافة';editFields.innerHTML=f.map(x=>`<div class="field"><label>${x}</label><input id="e_${x}" value="${r[x]||''}"></div>`).join('');editM.classList.add('active')}editF.onsubmit=e=>{e.preventDefault();let f=schemas[editKey]||['العنوان','الوصف','الحالة'],d=get(editKey),o={};f.forEach(x=>o[x]=document.getElementById('e_'+x).value||'—');if(editIdx!==null)d[editIdx]=o;else d.unshift(o);set(editKey,d);editM.classList.remove('active');openS(current)}function delRow(k,i){let d=get(k);d.splice(i,1);set(k,d);openS(current)}function danger(x){localStorage.setItem('afaq29_backup',JSON.stringify({requests:get('requests'),students:get('students'),payments:get('payments'),date:new Date().toISOString()}));if(confirm('اكتب أوافق على الحذف في الرسالة التالية')){let t=prompt('اكتب: أوافق على الحذف');if(t==='أوافق على الحذف'){if(x.includes('المنصة'))['requests','students','parents','payments'].forEach(k=>set(k,[]));if(x.includes('طلاب'))set('students',[]);if(x.includes('اشتراكات')){set('requests',[]);set('payments',[])}alert('تم التنفيذ بعد النسخ الاحتياطي');openS('reset')}}}drawSide();openS('home');</script></body></html>
