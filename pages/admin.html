<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المدير - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="dashboard-body">
  <div class="background">
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="dashboard-shell">
    <header class="dashboard-header">
      <div class="dashboard-title">
        <h1>لوحة المدير</h1>
        <p>إدارة المنصة والاشتراكات والطلاب والمدرسين.</p>
      </div>
      <a href="../index.html" class="back-btn">رجوع للرئيسية</a>
    </header>

    <section class="dashboard-grid">
      <div class="dashboard-card">
        <h3>🆕 طلبات جديدة</h3>
        <p id="newCount">0 طلب</p>
      </div>
      <div class="dashboard-card">
        <h3>✅ المقبولون</h3>
        <p id="acceptedCount">0 طالب</p>
      </div>
      <div class="dashboard-card">
        <h3>❌ المرفوضون</h3>
        <p id="rejectedCount">0 طالب</p>
      </div>
    </section>

    <section class="panel">
      <h2>طلبات الاشتراك الجديدة</h2>
      <div id="newRequests"></div>
    </section>

    <section class="panel">
      <h2>الطلاب المقبولون</h2>
      <div id="acceptedRequests"></div>
    </section>

    <section class="panel">
      <h2>الطلاب المرفوضون</h2>
      <div id="rejectedRequests"></div>
    </section>
  </main>

  <script src="../js/dashboard.js"></script>
  <script>
    const newRequestsBox = document.getElementById("newRequests");
    const acceptedRequestsBox = document.getElementById("acceptedRequests");
    const rejectedRequestsBox = document.getElementById("rejectedRequests");

    function renderAdmin(){
      const requests = getRequests();

      const newItems = requests.filter(item => item.status === "new");
      const acceptedItems = requests.filter(item => item.status === "accepted");
      const rejectedItems = requests.filter(item => item.status === "rejected");

      document.getElementById("newCount").textContent = newItems.length + " طلب";
      document.getElementById("acceptedCount").textContent = acceptedItems.length + " طالب";
      document.getElementById("rejectedCount").textContent = rejectedItems.length + " طالب";

      renderTable(newRequestsBox, newItems, true);
      renderTable(acceptedRequestsBox, acceptedItems, false);
      renderTable(rejectedRequestsBox, rejectedItems, false);
    }

    function renderTable(container, items, showActions){
      if(items.length === 0){
        container.innerHTML = '<div class="empty-message">لا توجد بيانات حالياً.</div>';
        return;
      }

      let rows = items.map(item => `
        <tr>
          <td>${item.studentName}</td>
          <td>${item.parentName}</td>
          <td>${item.grade}</td>
          <td>${item.phone}</td>
          <td>${item.amount}</td>
          <td>${requestStatusText(item.status)}</td>
          <td>${item.studentCode || "لم يحدد"}</td>
          <td>${formatDate(item.startDate)}</td>
          <td>${formatDate(item.endDate)}</td>
          <td>
            ${showActions ? `
              <button class="small-btn" onclick="acceptRequest('${item.id}')">قبول</button>
              <button class="small-btn reject-btn" onclick="rejectRequest('${item.id}')">رفض</button>
            ` : ""}
            <button class="small-btn delete-btn" onclick="deleteRequest('${item.id}')">حذف</button>
          </td>
        </tr>
      `).join("");

      container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>اسم الطالب</th>
                <th>ولي الأمر</th>
                <th>المرحلة</th>
                <th>الهاتف</th>
                <th>المبلغ</th>
                <th>الحالة</th>
                <th>كود الطالب</th>
                <th>بداية الاشتراك</th>
                <th>نهاية الاشتراك</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function acceptRequest(id){
      const code = prompt("أدخل كود الطالب:");
      if(!code) return;

      const startDate = prompt("تاريخ بداية الاشتراك مثال 2026-06-22:");
      const endDate = prompt("تاريخ نهاية الاشتراك اختياري:");

      const requests = getRequests().map(item => {
        if(item.id === id){
          return {
            ...item,
            status: "accepted",
            studentCode: code,
            startDate: startDate || "",
            endDate: endDate || ""
          };
        }
        return item;
      });

      saveRequests(requests);
      renderAdmin();
    }

    function rejectRequest(id){
      const requests = getRequests().map(item => {
        if(item.id === id){
          return {...item, status: "rejected"};
        }
        return item;
      });

      saveRequests(requests);
      renderAdmin();
    }

    function deleteRequest(id){
      if(!confirm("هل تريد حذف هذا الطلب؟")) return;
      const requests = getRequests().filter(item => item.id !== id);
      saveRequests(requests);
      renderAdmin();
    }

    renderAdmin();
  </script>
</body>
</html>
