<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة المدير</title><link rel="stylesheet" href="../css/style.css"></head><body class="dashboard-body"><div class="background"><span></span><span></span><span></span><span></span></div><main class="dashboard-shell"><header class="dashboard-header"><div class="dashboard-title"><h1>لوحة المدير</h1><p>إدارة منصة آفاق التعليمية</p></div><a href="../index.html" class="back-btn">تسجيل الخروج</a></header><section class="admin-frame"><aside class="side"><div class="side-title"><div class="logo">آ</div><div><h2>آفاق التعليمية</h2><p>مركز التحكم</p></div></div><div class="nav-group">الرئيسية</div><button class="nav-btn active" data-section="home">الرئيسية</button><button class="nav-btn" data-section="requests">طلبات الاشتراك <span class="badge-count" id="navNew">0</span></button><button class="nav-btn" data-section="accepted">الطلاب المقبولون</button><button class="nav-btn" data-section="rejected">الطلاب المرفوضون</button><div class="nav-group">الأوامر</div><button class="nav-btn" data-section="students">إدارة الطلاب</button><button class="nav-btn" data-section="teachers">إدارة المدرسين</button><button class="nav-btn" data-section="parents">إدارة أولياء الأمور</button><button class="nav-btn" data-section="stages">المراحل الدراسية</button><button class="nav-btn" data-section="subjects">المواد الدراسية</button><button class="nav-btn" data-section="subscriptions">الاشتراكات والدفع</button><button class="nav-btn" data-section="notifications">الإشعارات</button><button class="nav-btn" data-section="messages">الرسائل</button><button class="nav-btn" data-section="attendance">الحضور</button><button class="nav-btn" data-section="leaderboard">لوحة الشرف</button><button class="nav-btn" data-section="levels">المستويات</button><button class="nav-btn" data-section="appearance">المظهر</button><button class="nav-btn" data-section="backup">النسخ الاحتياطي</button><button class="nav-btn" data-section="reports">التقارير</button><button class="nav-btn" data-section="pwa">التطبيق PWA</button><button class="nav-btn" data-section="security">الأمان</button><button class="nav-btn" data-section="reset">إعادة ضبط المنصة</button></aside><div class="content" id="content"></div></section></main><div class="confirm-modal" id="confirmModal"><div class="confirm-box"><h2 id="confirmTitle">تأكيد الحذف</h2><p id="confirmText"></p><input id="confirmInput" placeholder="اكتب: أوافق على الحذف"><div class="request-actions"><button class="danger-btn" onclick="executeReset()">تنفيذ الحذف</button><button class="ghost-btn" onclick="closeConfirm()">إلغاء</button></div></div></div><script src="../js/dashboard.js"></script><script>
const sections = {
home:{title:'الرئيسية',desc:'مركز إدارة المنصة بالكامل.',type:'home'},
requests:{title:'طلبات الاشتراك الجديدة',desc:'مراجعة وقبول أو رفض طلبات الطلاب.',type:'requests',status:'new'},
accepted:{title:'الطلاب المقبولون',desc:'الطلاب الذين تم تفعيل اشتراكهم.',type:'requests',status:'accepted'},
rejected:{title:'الطلاب المرفوضون',desc:'طلبات تم رفضها.',type:'requests',status:'rejected'},
students:{title:'إدارة الطلاب',desc:'إضافة، تعديل، إيقاف، تفعيل، وحذف الطلاب.',type:'crud',key:'afaq_students',fields:['الاسم الثلاثي','المرحلة','كود الطالب','رقم الهاتف','الحالة']},
teachers:{title:'إدارة المدرسين',desc:'إضافة مدرس مع المرحلة والمادة وكود المدرس وكود المادة.',type:'crud',key:'afaq_teachers',fields:['الاسم الثلاثي','المرحلة','المادة','كود المدرس','كود المادة','الحالة']},
parents:{title:'إدارة أولياء الأمور',desc:'ربط ولي الأمر بالطالب، وكود ولي الأمر يساوي كود الطالب.',type:'crud',key:'afaq_parents',fields:['اسم ولي الأمر','اسم الطالب','كود ولي الأمر','رقم الهاتف']},
stages:{title:'المراحل الدراسية',desc:'إضافة وتعديل وترتيب وإظهار أو إخفاء المراحل.',type:'crud',key:'afaq_stages',fields:['اسم المرحلة','الترتيب','الحالة']},
subjects:{title:'المواد الدراسية',desc:'إضافة مادة وكودها وربطها بمرحلة وتحديد اللون والأيقونة.',type:'crud',key:'afaq_subjects',fields:['اسم المادة','كود المادة','المرحلة','اللون','الأيقونة','الترتيب']},
subscriptions:{title:'الاشتراكات والدفع',desc:'رقم الماستر، مدة الاشتراك، مبالغ المراحل، وسجل المدفوعات.',type:'settings',cards:['تحديد رقم الماستر','مبلغ الاشتراك لكل مرحلة','مدة الاشتراك','تفعيل/إيقاف الاشتراكات','قبول يدوي/تلقائي','سجل المدفوعات','تجديد الاشتراكات','إيقاف المنتهية']},
notifications:{title:'الإشعارات',desc:'إرسال إشعار عام أو مخصص وحذف جميع الإشعارات.',type:'settings',cards:['إشعار عام','إشعار لمرحلة','إشعار لمادة','إشعار لطالب','حذف جميع الإشعارات','الإشعارات الفورية']},
messages:{title:'الرسائل',desc:'التحكم بالرسائل والمرفقات والأرشفة.',type:'settings',cards:['رسائل الطالب والمدرس','رسائل ولي الأمر والمدرس','رسائل الإدارة','حجم المرفقات','حذف القديم تلقائياً','أرشفة الرسائل']},
attendance:{title:'إعدادات الحضور',desc:'تفعيل الحضور والغياب والتقارير الشهرية.',type:'settings',cards:['تفعيل الحضور','تفعيل الغياب','آلية الاحتساب','تقارير شهرية تلقائية']},
leaderboard:{title:'لوحة الشرف',desc:'تفعيل وترتيب الطلاب حسب الأداء.',type:'settings',cards:['تفعيل لوحة الشرف','عدد الطلاب الظاهرين','آلية الترتيب','الاختبارات الصحيحة','الواجبات الصحيحة','الحضور المستمر']},
levels:{title:'المستويات',desc:'تعديل أسماء المستويات وشروط الانتقال.',type:'crud',key:'afaq_levels',fields:['اسم المستوى','النسبة المطلوبة','الشروط']},
appearance:{title:'المظهر',desc:'الألوان والخط والوضع الداكن والفاتح.',type:'settings',cards:['الوضع الفاتح','الوضع الداكن','لون المنصة','لون الأزرار','لون البطاقات','نوع الخط','حجم الخط']},
backup:{title:'النسخ الاحتياطي',desc:'إنشاء واستعادة وتنزيل ورفع نسخة احتياطية.',type:'settings',cards:['إنشاء نسخة احتياطية','استعادة نسخة','تنزيل نسخة','رفع نسخة','حفظ تلقائي']},
reports:{title:'التقارير',desc:'تصدير PDF وExcel وتقارير تفصيلية.',type:'settings',cards:['تصدير PDF','تصدير Excel','تقارير الطلاب','تقارير المدرسين','تقارير الاشتراكات','تقارير الحضور']},
pwa:{title:'إعدادات التطبيق PWA',desc:'اسم التطبيق والأيقونة وشاشة التحميل والتحديث.',type:'settings',cards:['اسم التطبيق','أيقونة التطبيق','شاشة التحميل','الإشعارات','التحديث التلقائي']},
security:{title:'الأمان',desc:'السجلات، قفل الحسابات، مراقبة العمليات، وحماية البيانات.',type:'settings',cards:['سجل تسجيل الدخول','سجل النشاطات','قفل الحسابات المشبوهة','مراقبة العمليات','سجل التعديلات','حماية البيانات']},
reset:{title:'إعادة ضبط المنصة',desc:'حذف آمن ومتعدد المراحل مع نسخة احتياطية تلقائية.',type:'reset'}
};
document.querySelectorAll('.nav-btn').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');openSection(btn.dataset.section)});
function panelHead(s){return `<div class="panel"><div class="panel-head"><div><h2>${s.title}</h2><p>${s.desc}</p></div></div>`}
function openSection(id){const s=sections[id];if(!s)return;if(s.type==='home')renderHome();if(s.type==='requests')renderRequests(s);if(s.type==='crud')renderCrud(s);if(s.type==='settings')renderSettings(s);if(s.type==='reset')renderReset();}
function renderHome(){let r=getRequests(),n=r.filter(x=>x.status==='new').length,a=r.filter(x=>x.status==='accepted').length,j=r.filter(x=>x.status==='rejected').length,rev=r.filter(x=>x.status==='accepted').reduce((m,x)=>m+(+x.amount||0),0);content.innerHTML=`<section class="admin-section active"><div class="panel"><div class="panel-head"><div><h2>مركز إدارة آفاق</h2><p>جميع الأقسام أصبحت قابلة للفتح وتحتوي أوامر مبدئية كاملة.</p></div></div><div class="stats-row"><div class="metric"><h3>طلبات جديدة</h3><strong>${n}</strong></div><div class="metric"><h3>المقبولون</h3><strong>${a}</strong></div><div class="metric"><h3>المرفوضون</h3><strong>${j}</strong></div><div class="metric"><h3>الإيرادات</h3><strong>${rev.toLocaleString('ar-IQ')}</strong></div></div></div></section>`;navNew.textContent=n}
function renderRequests(s){let items=getRequests().filter(x=>x.status===s.status);content.innerHTML=panelHead(s)+`<div class="requests-list">${items.length?items.map(requestCard).join(''):'<div class="empty">لا توجد بيانات حالياً.</div>'}</div></div>`}
function requestCard(i){let actions=i.status==='new'?`<button class="action-btn" onclick="acceptRequest('${i.id}')">✓ قبول</button><button class="danger-btn" onclick="rejectRequest('${i.id}')">× رفض</button>`:'';return `<article class="request-item"><div class="student-main"><div class="student-avatar">👤</div><div><h3>${i.studentName}</h3><span class="tag">${i.grade}</span></div></div><div class="info-block"><small>ولي الأمر</small><strong>${i.parentName}</strong><small>الهاتف</small><strong>${i.phone}</strong></div><div class="info-block"><small>المبلغ</small><strong class="money">${(+i.amount||0).toLocaleString('ar-IQ')} د.ع</strong><small>الكود</small><strong>${i.studentCode||'لم يحدد'}</strong></div><div class="request-actions">${actions}<button class="ghost-btn" onclick="alert('الملاحظات: ${i.notes||'لا توجد'}')">عرض التفاصيل</button><button class="ghost-btn" onclick="deleteRequest('${i.id}')">حذف</button></div></article>`}
function renderCrud(s){let data=storageGet(s.key,[]);content.innerHTML=panelHead(s)+`<div class="form-grid"><div class="form-card"><h3>إضافة جديد</h3>${s.fields.map(f=>`<div class="field"><label>${f}</label><input id="f_${f}" placeholder="${f}"></div>`).join('')}<button class="action-btn" onclick="addCrud('${s.key}','${s.fields.join('|')}')">حفظ</button></div><div class="form-card" style="grid-column:span 2"><h3>السجلات الحالية</h3><div class="requests-list">${data.length?data.map((row,idx)=>`<article class="request-item" style="grid-template-columns:1fr 160px"><div>${Object.entries(row).map(([k,v])=>`<p><b>${k}:</b> ${v}</p>`).join('')}</div><div class="request-actions"><button class="ghost-btn" onclick="editCrud('${s.key}',${idx})">تعديل</button><button class="danger-btn" onclick="deleteCrud('${s.key}',${idx})">حذف</button></div></article>`).join(''):'<div class="empty">لا توجد سجلات بعد.</div>'}</div></div></div></div>`}
function renderSettings(s){content.innerHTML=panelHead(s)+`<div class="settings-grid">${s.cards.map(c=>`<div class="setting-card"><div class="setting-icon">⚙️</div><h3>${c}</h3><p>تحكم بهذا الخيار من لوحة المدير.</p><div class="switch-line"><span>تفعيل</span><input type="checkbox"></div><button class="mini-btn" onclick="alert('تم حفظ إعداد: ${c}')">حفظ الإعداد</button></div>`).join('')}</div></div>`}
function renderReset(){let ops=['إعادة ضبط المنصة بالكامل','حذف جميع الطلاب','حذف جميع المدرسين','حذف جميع الاختبارات','حذف جميع الواجبات','حذف سجلات الحضور والغياب','حذف جميع الرسائل','حذف جميع الإشعارات','تصفير جميع المستويات','حذف الاشتراكات وسجلات الدفع'];content.innerHTML=panelHead(sections.reset)+`<div class="reset-grid">${ops.map((o,i)=>`<div class="reset-card ${i==0?'main-reset':''}"><h3>🧹 ${o}</h3><p>سيتم إنشاء نسخة احتياطية تلقائياً قبل التنفيذ.</p><button class="danger-btn" onclick="openConfirm('${o}')">تنفيذ العملية</button></div>`).join('')}</div></div>`}
function addCrud(key,fields){let data=storageGet(key,[]),obj={};fields.split('|').forEach(f=>obj[f]=document.getElementById('f_'+f).value||'غير محدد');data.unshift(obj);storageSet(key,data);alert('تمت الإضافة');openSection(document.querySelector('.nav-btn.active').dataset.section)}
function editCrud(key,idx){let data=storageGet(key,[]);Object.keys(data[idx]).forEach(k=>{let v=prompt('تعديل '+k,data[idx][k]);if(v!==null)data[idx][k]=v});storageSet(key,data);openSection(document.querySelector('.nav-btn.active').dataset.section)}
function deleteCrud(key,idx){let data=storageGet(key,[]);data.splice(idx,1);storageSet(key,data);openSection(document.querySelector('.nav-btn.active').dataset.section)}
function acceptRequest(id){let code=prompt('أدخل كود الطالب:');if(!code)return;let startDate=prompt('تاريخ بداية الاشتراك:');let endDate=prompt('تاريخ نهاية الاشتراك اختياري:');saveRequests(getRequests().map(i=>i.id===id?{...i,status:'accepted',studentCode:code,startDate:startDate||'',endDate:endDate||''}:i));openSection('requests')}
function rejectRequest(id){saveRequests(getRequests().map(i=>i.id===id?{...i,status:'rejected'}:i));openSection('requests')}
function deleteRequest(id){if(confirm('هل تريد حذف الطلب؟')){saveRequests(getRequests().filter(i=>i.id!==id));openSection(document.querySelector('.nav-btn.active').dataset.section)}}
let pendingReset='';function openConfirm(name){pendingReset=name;confirmTitle.textContent='تأكيد: '+name;confirmText.textContent='سيتم إنشاء نسخة احتياطية. اكتب: أوافق على الحذف';confirmInput.value='';confirmModal.classList.add('active')}function closeConfirm(){confirmModal.classList.remove('active')}function executeReset(){if(confirmInput.value.trim()!=='أوافق على الحذف'){alert('يجب كتابة العبارة بشكل صحيح');return}localStorage.setItem('afaq_last_backup',JSON.stringify({date:new Date().toISOString(),requests:getRequests()}));if(pendingReset.includes('المنصة')||pendingReset.includes('الطلاب')||pendingReset.includes('الاشتراكات'))saveRequests([]);alert('تم تنفيذ العملية بعد إنشاء نسخة احتياطية');closeConfirm();openSection('reset')}
openSection('home');
</script></body></html>
