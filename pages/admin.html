<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة المدير</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="dash">
<main class="wrap">
<header class="head">
  <div><h1>لوحة المدير</h1><p class="muted">نظام الاشتراكات الكامل - الإصدار 2.9.2</p></div>
  <a class="btn" href="../index.html">خروج</a>
</header>

<section class="layout">
  <aside class="side" id="side"></aside>
  <div id="content"></div>
</section>
</main>

<div class="modal" id="accM">
  <div class="box">
    <button class="x" onclick="document.getElementById('accM').classList.remove('active')">×</button>
    <h2>اعتماد الاشتراك</h2>
    <form id="accF" class="grid">
      <div class="field"><label>كود الطالب</label><input id="code" required></div>
      <div class="field"><label>رقم الماستر</label><input id="master" required></div>
      <div class="field"><label>تاريخ البداية</label><input id="start" type="date" required></div>
      <div class="field"><label>تاريخ الانتهاء</label><input id="end" type="date" required></div>
      <button class="primary" style="grid-column:1/-1">اعتماد الاشتراك</button>
    </form>
  </div>
</div>

<div class="modal" id="editM">
  <div class="box">
    <button class="x" onclick="document.getElementById('editM').classList.remove('active')">×</button>
    <h2 id="editT">إضافة</h2>
    <form id="editF">
      <div id="editFields"></div>
      <button class="primary">حفظ</button>
    </form>
  </div>
</div>

<script src="../js/admin-core.js?v=292"></script>
<script src="../js/admin.js?v=292"></script>
</body>
</html>
