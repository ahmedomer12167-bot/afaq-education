<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة المدير - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/main.css?v=100-exact-pro">
</head>
<body data-page="admin">
  <header class="dash-header container">
    <div class="brand"><div class="brand-mark">✤</div><div><h2>لوحة المدير</h2><p data-platform-name>آفاق التعليمية</p></div></div>
    <div class="dash-actions"><button class="back-home btn-ghost">رجوع للرئيسية</button><button class="theme-toggle btn-ghost">الوضع</button><button class="logout danger">تسجيل الخروج</button></div>
  </header>
  <main class="container dashboard">
    <aside class="sidebar glass">
      <button class="tab-btn active" data-tab="overview">الرئيسية</button>
      <button class="tab-btn" data-tab="settings">إعدادات المنصة</button>
      <button class="tab-btn" data-tab="stages">المراحل الدراسية</button>
      <button class="tab-btn" data-tab="requests">طلبات الاشتراك</button>
      <button class="tab-btn" data-tab="students">الطلاب المقبولون</button>
    </aside>
    <section class="dash-content">
      <div id="overview" class="tab active">
        <div class="section-title"><h1>مرحباً بك في لوحة الإدارة</h1><p>من هنا يمكنك إدارة الاشتراكات والمراحل والإعدادات.</p></div>
        <div class="stat-grid"><div class="stat glass"><b id="requestsCount">0</b><span>طلبات الاشتراك</span></div><div class="stat glass"><b id="studentsCount">0</b><span>طلاب مقبولون</span></div><div class="stat glass"><b id="stagesCount">0</b><span>مراحل</span></div><div class="stat glass"><b id="acceptStatus">مفعل</b><span>استقبال الطلبات</span></div></div>
      </div>
      <div id="settings" class="tab glass panel-pad">
        <h2>إعدادات المنصة</h2>
        <form id="settingsForm" class="form-grid">
          <input id="platformName" class="input" placeholder="اسم المنصة">
          <input id="masterNumber" class="input" placeholder="رقم الماستر الذي يظهر للطالب">
          <input id="adminCodeNew" class="input" placeholder="كود المدير">
          <input id="footerMessage" class="input" placeholder="رسالة الفوتر">
          <textarea id="welcomeMessage" class="input full" placeholder="رسالة الترحيب"></textarea>
          <label class="switch-row full"><span>استقبال طلبات الاشتراك</span><input id="acceptRequests" type="checkbox"></label>
          <button class="btn-wide full">حفظ الإعدادات</button>
        </form>
      </div>
      <div id="stages" class="tab glass panel-pad">
        <h2>المراحل الدراسية</h2>
        <form id="stageForm" class="form-grid"><input id="stageName" class="input" placeholder="اسم المرحلة"><button>إضافة مرحلة</button></form>
        <div id="stagesList" class="card-list"></div>
      </div>
      <div id="requests" class="tab glass panel-pad">
        <h2>طلبات الاشتراك</h2>
        <div id="requestsList" class="card-list"></div>
      </div>
      <div id="students" class="tab glass panel-pad">
        <h2>الطلاب المقبولون</h2>
        <div id="studentsList" class="card-list"></div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script type="module" src="../js/app.js?v=100-exact-pro"></script>
</body>
</html>
