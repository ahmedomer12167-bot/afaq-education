<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة المدير</title><link rel="stylesheet" href="../css/style.css"></head><body class="dashboard-body"><div class="background"><span></span><span></span><span></span><span></span></div><main class="admin-wrap"><header class="admin-top"><div><h1>لوحة المدير</h1><p class="muted">نظام إدارة كامل بأقسام وجداول ونوافذ إضافة وتعديل.</p></div><a class="logout" href="../index.html">تسجيل الخروج</a></header><section class="admin-layout"><aside class="sidebar" id="sidebar"></aside><div class="content" id="content"></div></section></main><div class="modal" id="editModal"><div class="modal-box"><button class="close" onclick="closeEdit()">×</button><h2 id="editTitle">إضافة</h2><form id="editForm"><div id="editFields"></div><button class="submit-btn">حفظ</button></form></div></div><div class="confirm" id="confirmBox"><div class="confirm-box"><h2 id="confirmTitle">تأكيد</h2><p id="confirmText"></p><input id="confirmInput" placeholder="اكتب: أوافق على الحذف"><button class="btn-red" onclick="executeDanger()">تنفيذ</button><button class="btn-ghost" onclick="closeDanger()">إلغاء</button></div></div><script src="../js/admin-core.js"></script><script>
seed();let current='home',editKey='',editIndex=null,dangerName='';const nav=[['الرئيسية','home','⌂'],['طلبات الاشتراك','requests','✉️'],['الطلاب المقبولون','accepted','✅'],['الطلاب المرفوضون','rejected','❌'],['إدارة الطلاب','students','🎓'],['إدارة المدرسين','teachers','👨‍🏫'],['إدارة أولياء الأمور','parents','👨‍👩‍👦'],['المراحل الدراسية','stages','🏫'],['المواد الدراسية','subjects','📚'],['الاشتراكات والدفع','payments','💳'],['الإشعارات','notifications','🔔'],['الرسائل','messages','💬'],['الحضور','attendance','✅'],['لوحة الشرف','leaderboard','🏆'],['المستويات','levels','⭐'],['المظهر','appearance','🎨'],['النسخ الاحتياطي','backup','☁️'],['التقارير','reports','📄'],['التطبيق PWA','pwa','📱'],['الأمان','security','🛡️'],['إعادة ضبط المنصة','reset','🔴']];const titles={students:'إدارة الطلاب',teachers:'إدارة المدرسين',parents:'إدارة أولياء الأمور',stages:'المراحل الدراسية',subjects:'المواد الدراسية',payments:'الاشتراكات وسجل المدفوعات',notifications:'الإشعارات',messages:'الرسائل',attendance:'الحضور والغياب',leaderboard:'لوحة الشرف',levels:'المستويات',security:'سجل الأمان'};function renderSidebar(){sidebar.innerHTML='<div class="side-brand"><div class="logo">آ</div><div><h2>آفاق التعليمية</h2><p class="muted">مركز التحكم</p></div></div>'+nav.map((n,i)=>([0,4,10,19].includes(i)?'<div class="nav-title">'+(['الرئيسية','الإدارة','الأنظمة','الأمان'][[0,4,10,19].indexOf(i)])+'</div>':'')+`<button class="nav ${current===n[1]?'active':''}" onclick="openSec('${n[1]}')"><span>${n[0]}</span><span>${n[2]}</span></button>`).join('')}function openSec(s){current=s;renderSidebar();if(s==='home')home();else if(['requests','accepted','rejected'].includes(s))requests(s);else if(s==='appearance')settingsPage('إعدادات المظهر',['الوضع الفاتح','الوضع الداكن','لون المنصة الرئيسي','لون الأزرار','لون البطاقات','نوع الخط','حجم الخط']);else if(s==='backup')settingsPage('النسخ الاحتياطي',['إنشاء نسخة احتياطية','استعادة نسخة احتياطية','تنزيل نسخة','رفع نسخة','حفظ تلقائي']);else if(s==='reports')settingsPage('التقارير',['تصدير PDF','تصدير Excel','تقارير الطلاب','تقارير المدرسين','تقارير الاشتراكات','تقارير الحضور']);else if(s==='pwa')settingsPage('إعدادات التطبيق PWA',['اسم التطبيق','أيقونة التطبيق','شاشة التحميل','الإشعارات','التحديث التلقائي']);else if(s==='reset')resetPage();else tablePage(s)}function head(t,d){return `<div class="panel"><div class="panel-head"><div><h2>${t}</h2><p>${d||'إدارة كاملة مع إضافة وتعديل وحذف وحفظ مؤقت.'}</p></div></div>`}function home(){let r=get('requests'),n=r.filter(x=>x.status==='new').length,a=r.filter(x=>x.status==='accepted').length,rev=r.filter(x=>x.status==='accepted').reduce((m,x)=>m+(+x.amount||0),0);content.innerHTML=head('مركز إدارة آفاق','نظرة عامة على المنصة.')+`<div class="stats"><div class="stat"><h3>طلبات جديدة</h3><strong>${n}</strong></div><div class="stat"><h3>طلاب مقبولون</h3><strong>${a}</strong></div><div class="stat"><h3>عدد المدرسين</h3><strong>${get('teachers').length}</strong></div><div class="stat"><h3>الإيرادات</h3><strong>${rev.toLocaleString('ar-IQ')}</strong></div></div></div>`}function requests(type){let status=type==='requests'?'new':type==='accepted'?'accepted':'rejected',arr=get('requests').filter(x=>x.status===status);content.innerHTML=head(type==='requests'?'طلبات الاشتراك الجديدة':type==='accepted'?'الطلاب المقبولون':'الطلاب المرفوضون','قبول ورفض وعرض التفاصيل.')+`<div class="table-box"><table class="data-table"><thead><tr><th>الطالب</th><th>ولي الأمر</th><th>المرحلة</th><th>الهاتف</th><th>المبلغ</th><th>الكود</th><th>إجراءات</th></tr></thead><tbody>${arr.length?arr.map(reqRow).join(''):'<tr><td colspan="7"><div class="empty">لا توجد بيانات.</div></td></tr>'}</tbody></table></div></div>`}function reqRow(x){return `<tr><td>${x.studentName}</td><td>${x.parentName}</td><td>${x.grade}</td><td>${x.phone}</td><td>${x.amount}</td><td>${x.studentCode||'لم يحدد'}</td><td><div class="row-actions">${x.status==='new'?`<button class="btn-green" onclick="acceptReq('${x.id}')">قبول</button><button class="btn-red" onclick="rejectReq('${x.id}')">رفض</button>`:''}<button class="btn-ghost" onclick="alert('الملاحظات: ${x.notes||'لا توجد'}')">تفاصيل</button><button class="btn-ghost" onclick="delReq('${x.id}')">حذف</button></div></td></tr>`}function tablePage(key){let fields=schemas[key]||['العنوان','الوصف','الحالة'],data=get(key);content.innerHTML=head(titles[key]||key)+`<div class="toolbar"><input placeholder="بحث..."><button class="btn" onclick="openEdit('${key}')">➕ إضافة جديد</button><button class="btn-ghost" onclick="alert(JSON.stringify(get('${key}'),null,2))">تصدير JSON</button></div><div class="table-box"><table class="data-table"><thead><tr>${fields.map(f=>`<th>${f}</th>`).join('')}<th>إجراءات</th></tr></thead><tbody>${data.length?data.map((row,i)=>`<tr>${fields.map(f=>`<td>${row[f]||'—'}</td>`).join('')}<td><div class="row-actions"><button class="btn" onclick="openEdit('${key}',${i})">تعديل</button><button class="btn-orange" onclick="duplicateRow('${key}',${i})">نسخ</button><button class="btn-red" onclick="deleteRow('${key}',${i})">حذف</button></div></td></tr>`).join(''):'<tr><td colspan="'+(fields.length+1)+'"><div class="empty">لا توجد سجلات بعد.</div></td></tr>'}</tbody></table></div></div>`}function settingsPage(title,cards){content.innerHTML=head(title,'أوامر إعدادات جاهزة للحفظ والتفعيل.')+`<div class="cards-grid">${cards.map(c=>`<div class="card"><h3>⚙️ ${c}</h3><p>تحكم بهذا الخيار من لوحة المدير.</p><div class="switch"><span>تفعيل</span><input type="checkbox"></div><button class="btn" onclick="alert('تم حفظ ${c}')">حفظ</button></div>`).join('')}</div></div>`}function resetPage(){let ops=['إعادة ضبط المنصة بالكامل','حذف جميع الطلاب','حذف جميع المدرسين','حذف جميع الاختبارات','حذف جميع الواجبات','حذف جميع سجلات الحضور والغياب','حذف جميع الرسائل','حذف جميع الإشعارات','تصفير جميع المستويات','حذف جميع الاشتراكات وسجلات الدفع'];content.innerHTML=head('🔴 إعادة ضبط المنصة','كل عملية تحتاج كتابة عبارة التأكيد مع نسخة احتياطية تلقائية.')+`<div class="cards-grid">${ops.map((o,i)=>`<div class="card danger-card ${i===0?'big':''}"><h3>🧹 ${o}</h3><p>سيتم إنشاء نسخة احتياطية تلقائياً قبل التنفيذ.</p><button class="btn-red" onclick="openDanger('${o}')">تنفيذ</button></div>`).join('')}</div></div>`}function openEdit(key,i=null){editKey=key;editIndex=i;let fields=schemas[key]||['العنوان','الوصف','الحالة'],row=i!==null?get(key)[i]:{};editTitle.textContent=i!==null?'تعديل سجل':'إضافة سجل';editFields.innerHTML=fields.map(f=>`<div class="field"><label>${f}</label><input id="edit_${f}" value="${row[f]||''}"></div>`).join('');editModal.classList.add('active')}function closeEdit(){editModal.classList.remove('active')}editForm.onsubmit=e=>{e.preventDefault();let fields=schemas[editKey]||['العنوان','الوصف','الحالة'],data=get(editKey),obj={};fields.forEach(f=>obj[f]=document.getElementById('edit_'+f).value||'—');if(editIndex!==null)data[editIndex]=obj;else data.unshift(obj);set(editKey,data);closeEdit();tablePage(editKey)};function deleteRow(key,i){if(confirm('حذف السجل؟')){let d=get(key);d.splice(i,1);set(key,d);tablePage(key)}}function duplicateRow(key,i){let d=get(key);d.unshift({...d[i]});set(key,d);tablePage(key)}function acceptReq(id){let code=prompt('أدخل كود الطالب:');if(!code)return;let start=prompt('تاريخ البداية:')||'',end=prompt('تاريخ النهاية اختياري:')||'';set('requests',get('requests').map(x=>x.id===id?{...x,status:'accepted',studentCode:code,startDate:start,endDate:end}:x));requests('requests')}function rejectReq(id){set('requests',get('requests').map(x=>x.id===id?{...x,status:'rejected'}:x));requests('requests')}function delReq(id){if(confirm('حذف الطلب؟')){set('requests',get('requests').filter(x=>x.id!==id));openSec(current)}}function openDanger(n){dangerName=n;confirmTitle.textContent='تأكيد: '+n;confirmText.textContent='سيتم إنشاء نسخة احتياطية. اكتب: أوافق على الحذف';confirmInput.value='';confirmBox.classList.add('active')}function closeDanger(){confirmBox.classList.remove('active')}function executeDanger(){if(confirmInput.value.trim()!=='أوافق على الحذف'){alert('اكتب العبارة بشكل صحيح');return}localStorage.setItem('afaq28_backup',JSON.stringify({date:new Date().toISOString(),data:{requests:get('requests'),students:get('students'),teachers:get('teachers')}}));if(dangerName.includes('طلاب'))set('students',[]);if(dangerName.includes('مدرسين'))set('teachers',[]);if(dangerName.includes('اشتراكات')||dangerName.includes('المنصة'))set('requests',[]);alert('تم التنفيذ بعد إنشاء نسخة احتياطية.');closeDanger();openSec('reset')}renderSidebar();openSec('home');
</script></body></html>
