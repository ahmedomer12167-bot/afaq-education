<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة ولي الأمر</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div><h1>لوحة ولي الأمر</h1><p class="muted" id="parentInfo"></p></div><a class="btn" href="../index.html">خروج</a></header><section class="panel" id="parentContent"></section></main><script src="../js/admin-core.js?v=531"></script><script>seedBase();var p=JSON.parse(sessionStorage.getItem('afaq_current_parent')||'null');if(!p){alert('يجب تسجيل الدخول أولاً');location.href='../index.html'}var s=getData('students').find(function(x){return x.code===p.studentCode||x.name===p.studentName});parentInfo.textContent=p.name+' / الطالب: '+(p.studentName||'');if(!s){parentContent.innerHTML='<div class="empty">لم يتم العثور على الطالب.</div>'}else{var pts=calcStudentPoints(s);var finals=getData('finalGrades').filter(function(g){return g.studentName===s.name});var html='<h2>متابعة الطالب</h2><div class="details-grid"><div class="detail-box"><b>الطالب</b>'+s.name+'</div><div class="detail-box"><b>النقاط</b>'+pts+'</div><div class="detail-box"><b>المستوى</b>'+levelFromPoints(pts)+'</div><div class="detail-box"><b>الاشتراك</b>'+(s.subscriptionStatus||'—')+'</div></div><h2>النتائج النهائية</h2><div class="card-grid">';if(!finals.length)html+='<div class="empty">لا توجد نتائج نهائية.</div>';finals.forEach(function(g){html+='<div class="data-card"><div class="icon-big">🎯</div><h3>'+g.subject+'</h3><p class="final-grade">'+g.grade+' / '+g.finalScore+'</p></div>'});parentContent.innerHTML=html+'</div>'}</script></body></html>
