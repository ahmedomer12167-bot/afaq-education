<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>معلومات الطالب</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div><h1>معلومات الطالب</h1><p class="muted">عرض كامل بدون جدول طويل</p></div><div class="top-actions"><a class="btn" href="admin.html">رجوع للمدير</a><a class="btn" href="../index.html">خروج</a></div></header><section class="panel" id="details"></section></main><script src="../js/admin-core.js"></script><script>seedBase();let params=new URLSearchParams(location.search);let sid=params.get('id');let s=getData('students').find(x=>x.id===sid);if(!s){details.innerHTML='<div class="empty">لم يتم العثور على الطالب</div>'}else{let exp=isExpired(s.endDate);details.innerHTML=`<div class="student-avatar">🎓</div><h2>${s.name}</h2><div class="details-grid"><div class="detail-box"><b>المرحلة</b>${s.stage}</div><div class="detail-box"><b>كود الطالب</b>${s.code}</div><div class="detail-box"><b>ولي الأمر</b>${s.parentName||'—'}</div><div class="detail-box"><b>رقم الهاتف</b>${s.phone||'—'}</div><div class="detail-box"><b>تاريخ البداية</b>${s.startDate||'—'}</div><div class="detail-box"><b>تاريخ الانتهاء</b>${s.endDate||'—'}</div><div class="detail-box"><b>حالة الحساب</b>${s.status}</div><div class="detail-box"><b>حالة الاشتراك</b>${exp?'منتهي':s.subscriptionStatus}</div><div class="detail-box"><b>المبلغ</b>${s.amount||'—'}</div><div class="detail-box"><b>ملاحظات</b>${s.note||'—'}</div></div>`}</script></body></html>
