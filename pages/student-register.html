<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>طلب اشتراك</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div><h1>طلب اشتراك طالب جديد</h1><p class="muted">يتم إرسال الطلب إلى لوحة المدير.</p></div><a class="btn" href="../index.html">رجوع</a></header><section class="panel"><form id="f" class="grid"><div class="field"><label>الاسم الثلاثي للطالب</label><input id="s" required></div><div class="field"><label>الاسم الثلاثي لولي الأمر</label><input id="p" required></div><div class="field"><label>المرحلة</label><select id="g"><option>الأول متوسط</option><option>الثالث متوسط</option><option>السادس الإعدادي</option></select></div><div class="field"><label>رقم الهاتف</label><input id="ph" required></div><div class="field"><label>المبلغ المدفوع</label><input id="am" type="number" required></div><div class="field"><label>ملاحظات</label><textarea id="no"></textarea></div><button class="primary" style="grid-column:1/-1">إرسال الطلب</button></form></section></main><script src="../js/admin-core.js"></script><script>f.onsubmit=e=>{e.preventDefault();let r=get('requests');r.unshift({id:id(),studentName:s.value,parentName:p.value,grade:g.value,phone:ph.value,amount:am.value,notes:no.value,status:'new',studentCode:'',masterNumber:'',startDate:'',endDate:'',subStatus:'بانتظار القبول',createdAt:today()});set('requests',r);alert('تم إرسال الطلب');location.href='../index.html'}</script></body></html>
