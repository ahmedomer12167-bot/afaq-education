<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب اشتراك طالب - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="dashboard-body">
  <div class="background">
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="dashboard-shell">
    <header class="dashboard-header">
      <div class="dashboard-title">
        <h1>طلب اشتراك طالب جديد</h1>
        <p>يتم إرسال الطلب إلى لوحة المدير للمراجعة والقبول.</p>
      </div>
      <a href="../index.html" class="back-btn">رجوع للرئيسية</a>
    </header>

    <section class="panel">
      <h2>استمارة الاشتراك</h2>
      <form id="subscriptionForm">
        <div class="field">
          <label>الاسم الثلاثي للطالب</label>
          <input type="text" id="studentName" required>
        </div>

        <div class="field">
          <label>الاسم الثلاثي لولي الأمر</label>
          <input type="text" id="parentName" required>
        </div>

        <div class="field">
          <label>المرحلة الدراسية</label>
          <select id="grade" required>
            <option>الأول متوسط</option>
            <option>الثاني متوسط</option>
            <option>الثالث متوسط</option>
            <option>الرابع الإعدادي</option>
            <option>الخامس الإعدادي</option>
            <option>السادس الإعدادي</option>
          </select>
        </div>

        <div class="field">
          <label>رقم الهاتف</label>
          <input type="tel" id="phone" required>
        </div>

        <div class="field">
          <label>المبلغ المدفوع</label>
          <input type="number" id="amount" required>
        </div>

        <div class="field">
          <label>ملاحظات إضافية اختياري</label>
          <textarea id="notes"></textarea>
        </div>

        <button class="submit-btn" type="submit">إرسال طلب الاشتراك</button>
      </form>
    </section>
  </main>

  <script src="../js/dashboard.js"></script>
  <script>
    const form = document.getElementById("subscriptionForm");

    form.addEventListener("submit", function(e){
      e.preventDefault();

      const requests = getRequests();

      const newRequest = {
        id: Date.now().toString(),
        studentName: document.getElementById("studentName").value.trim(),
        parentName: document.getElementById("parentName").value.trim(),
        grade: document.getElementById("grade").value,
        phone: document.getElementById("phone").value.trim(),
        amount: document.getElementById("amount").value,
        notes: document.getElementById("notes").value.trim(),
        status: "new",
        studentCode: "",
        startDate: "",
        endDate: "",
        createdAt: new Date().toLocaleString("ar-IQ")
      };

      requests.unshift(newRequest);
      saveRequests(requests);

      alert("تم إرسال طلب الاشتراك إلى المدير بنجاح.");
      window.location.href = "../index.html";
    });
  </script>
</body>
</html>
