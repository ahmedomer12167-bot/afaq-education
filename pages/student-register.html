<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>طلب اشتراك</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="dash">
<main class="wrap">
<header class="head">
  <div><h1>طلب اشتراك طالب جديد</h1><p class="muted">يتم إرسال الطلب إلى لوحة المدير.</p></div>
  <a class="btn" href="../index.html">رجوع</a>
</header>

<section class="panel">
  <div class="paybox" id="paymentInfo"></div>

  <form id="f" class="formgrid">
    <div class="field"><label>الاسم الثلاثي للطالب</label><input id="s" required></div>
    <div class="field"><label>الاسم الثلاثي لولي الأمر</label><input id="p" required></div>
    <div class="field"><label>المرحلة</label><select id="g"><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select></div>
    <div class="field"><label>رقم الهاتف</label><input id="ph" required></div>
    <div class="field"><label>المبلغ المدفوع</label><input id="am" type="number" required></div>
    <div class="field full"><label>ملاحظات</label><textarea id="no"></textarea></div>
    <button class="primary full">إرسال الطلب</button>
  </form>
</section>
</main>

<script src="../js/admin-core.js"></script>
<script>
var settings = getSettings();
document.getElementById('paymentInfo').innerHTML =
  '<h3>💳 معلومات الدفع</h3>' +
  '<div class="payline"><b>رقم الماستر:</b> ' + settings.masterNumber + '</div>' +
  '<div class="payline"><b>اسم صاحب البطاقة:</b> ' + settings.cardOwner + '</div>' +
  '<div class="payline"><b>البنك:</b> ' + settings.bankName + '</div>' +
  '<p>' + settings.paymentInstructions + '</p>';

document.getElementById('f').onsubmit = function(e){
  e.preventDefault();
  var requests = getData('requests');

  requests.unshift({
    id: id(),
    studentName: document.getElementById('s').value,
    parentName: document.getElementById('p').value,
    grade: document.getElementById('g').value,
    phone: document.getElementById('ph').value,
    amount: document.getElementById('am').value,
    notes: document.getElementById('no').value,
    status: 'new',
    studentCode: '',
    startDate: '',
    endDate: '',
    subStatus: 'بانتظار القبول',
    paymentStatus: 'بانتظار المراجعة',
    adminNote: '',
    createdAt: today()
  });

  setData('requests', requests);
  alert('تم إرسال الطلب');
  location.href = '../index.html';
};
</script>
</body>
</html>
