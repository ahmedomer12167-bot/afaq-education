<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلب اشتراك طالب</title><link rel="stylesheet" href="../css/style.css"></head><body class="dashboard-body"><div class="background"><span></span><span></span><span></span><span></span></div><main class="dashboard-shell"><header class="dashboard-header"><div class="dashboard-title"><h1>طلب اشتراك طالب جديد</h1><p>يتم إرسال الطلب إلى لوحة المدير للمراجعة والقبول.</p></div><a href="../index.html" class="back-btn">رجوع للرئيسية</a></header><section class="panel"><div class="panel-head"><div><h2>استمارة الاشتراك</h2><p>املأ البيانات التالية بدقة.</p></div></div><form id="subscriptionForm"><div class="field"><label>الاسم الثلاثي للطالب</label><input id="studentName" required></div><div class="field"><label>الاسم الثلاثي لولي الأمر</label><input id="parentName" required></div><div class="field"><label>المرحلة الدراسية</label><select id="grade"><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select></div><div class="field"><label>رقم الهاتف</label><input id="phone" required></div><div class="field"><label>المبلغ المدفوع</label><input id="amount" type="number" required></div><div class="field"><label>ملاحظات إضافية اختياري</label><textarea id="notes"></textarea></div><button class="submit-btn">إرسال طلب الاشتراك</button></form></section></main><script src="../js/dashboard.js"></script><script>subscriptionForm.onsubmit=e=>{e.preventDefault();let r=getRequests();r.unshift({id:Date.now().toString(),studentName:studentName.value,parentName:parentName.value,grade:grade.value,phone:phone.value,amount:amount.value,notes:notes.value,status:'new',studentCode:'',startDate:'',endDate:'',createdAt:new Date().toLocaleDateString('ar-IQ')});saveRequests(r);alert('تم إرسال الطلب بنجاح');location.href='../index.html'}</script></body></html>
