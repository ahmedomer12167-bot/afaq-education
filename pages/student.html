<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة الطالب - آفاق التعليمية</title><link rel="stylesheet" href="../css/main.css?v=100-exact-pro">
</head>
<body data-page="student">
  <header class="dash-header container">
    <div class="brand"><div class="brand-mark">✤</div><div><h2>لوحة الطالب</h2><p data-platform-name>آفاق التعليمية</p></div></div>
    <div class="dash-actions"><button class="back-home btn-ghost">رجوع للرئيسية</button><button class="theme-toggle btn-ghost">الوضع</button><button class="logout danger">تسجيل الخروج</button></div>
  </header>
  <main class="container">
    <section class="glass student-hero">
      <h1>مرحباً، <span id="studentName">طالب</span></h1>
      <p>هذه لوحة الطالب الأساسية، وستظهر فيها بقية الأقسام في الإصدارات القادمة حسب المرحلة فقط.</p>
      <div class="stat-grid"><div class="stat"><span>المرحلة</span><b id="studentStage">—</b></div><div class="stat"><span>كود الطالب</span><b id="studentCodeView">—</b></div><div class="stat"><span>النقاط</span><b id="studentPoints">0</b></div><div class="stat"><span>المستوى</span><b id="studentLevel">—</b></div></div>
      <div class="info-card"><b>انتهاء الاشتراك</b><span id="studentEnd">—</span></div>
    </section>
    <section class="module-grid"><div class="module-card">📚 الدروس</div><div class="module-card">🧪 الاختبارات</div><div class="module-card">📝 الواجبات</div><div class="module-card">🔔 الإشعارات</div></section>
  </main>
  <div id="toast" class="toast"></div>
  <script type="module" src="../js/app.js?v=100-exact-pro"></script>
</body></html>
