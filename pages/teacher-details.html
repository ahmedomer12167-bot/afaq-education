<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>معلومات المدرس</title><link rel="stylesheet" href="../css/style.css"></head>
<body class="dash">
<main class="wrap">
<header class="head"><div><h1>معلومات المدرس</h1><p class="muted">عرض كامل بدون جدول طويل</p></div><div class="top-actions"><button id="themeToggle" class="theme-toggle" data-theme-toggle>☀️</button><a class="btn" href="admin.html">رجوع للمدير</a><a class="btn" href="../index.html">خروج</a></div></header>
<section class="panel" id="details"></section>
</main>
<script src="../js/admin-core.js"></script>
<script>
seedBase();
var params = new URLSearchParams(location.search);
var tid = params.get('id');
var t = getData('teachers').find(function(x){ return x.id === tid; });
if(!t){
  document.getElementById('details').innerHTML = '<div class="empty">لم يتم العثور على المدرس</div>';
}else{
  var img = t.photo ? '<img class="detail-photo" src="' + t.photo + '">' : '<div class="teacher-placeholder">👨‍🏫</div>';
  document.getElementById('details').innerHTML =
    img + '<h2>' + t.name + '</h2>' +
    '<div class="details-grid">' +
    '<div class="detail-box"><b>المرحلة</b>' + t.stage + '</div>' +
    '<div class="detail-box"><b>المادة</b>' + t.subject + '</div>' +
    '<div class="detail-box"><b>كود المدرس</b>' + t.teacherCode + '</div>' +
    '<div class="detail-box"><b>كود المادة</b>' + t.subjectCode + '</div>' +
    '<div class="detail-box"><b>رقم الهاتف</b>' + (t.phone || '—') + '</div>' +
    '<div class="detail-box"><b>المؤهل العلمي</b>' + (t.qualification || '—') + '</div>' +
    '<div class="detail-box"><b>الحالة</b>' + t.status + '</div>' +
    '<div class="detail-box"><b>نبذة المدرس</b>' + (t.bio || '—') + '</div>' +
    '</div>';
}
</script>
<script src="../js/theme.js?v=70"></script></body>
</html>
