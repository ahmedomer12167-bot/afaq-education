<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة المدرس</title><link rel="stylesheet" href="../css/style.css"></head><body class="dash"><main class="wrap"><header class="head"><div class="teacher-hero"><div id="teacherPhotoBox" class="teacher-placeholder">👨‍🏫</div><div><h1>لوحة المدرس</h1><p class="muted" id="teacherInfo">جاري التحميل...</p></div></div><a class="btn" href="../index.html" onclick="sessionStorage.removeItem('afaq_current_teacher')">خروج</a></header><section class="layout"><aside class="side" id="teacherSide"></aside><div id="teacherContent"></div></section></main><div class="modal" id="teacherModal"><div class="box"><button class="x" onclick="teacherModal.classList.remove('active')">×</button><h2 id="modalTitle">إضافة</h2><form id="teacherForm" class="formgrid"><div id="formFields" class="full formgrid"></div><button class="primary full">حفظ</button></form></div></div><div class="modal" id="questionModal"><div class="box"><button class="x" onclick="questionModal.classList.remove('active')">×</button><h2>إضافة سؤال</h2><form id="questionForm" class="formgrid"><div class="field"><label>نوع السؤال</label><select id="qType"><option>اختيار من متعدد</option><option>صح وخطأ</option><option>املأ الفراغ</option><option>مقالي</option></select></div><div class="field"><label>درجة السؤال</label><select id="qScore"><option>1</option><option>2</option><option>5</option><option>10</option><option>15</option><option>20</option></select></div><div class="field full"><label>نص السؤال</label><textarea id="qText" required></textarea></div><div class="field full"><label>الاختيارات / كل اختيار بسطر</label><textarea id="qOptions"></textarea></div><div class="field full"><label>الإجابة الصحيحة</label><input id="qAnswer"></div><button class="primary full">حفظ السؤال في البنك</button></form></div></div><div class="modal" id="detailModal"><div class="box"><button class="x" onclick="detailModal.classList.remove('active')">×</button><h2>التفاصيل</h2><div id="detailContent"></div></div></div><script src="../js/admin-core.js?v=531"></script><script src="../js/teacher.js?v=531"></script></body></html>
